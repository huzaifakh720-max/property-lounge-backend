<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Property Lounge</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">Property Lounge</div>

<nav>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/services">Services</a>
<a href="/contact">Contact</a>
<a href="/privacy">Privacy</a>
</nav>

</header>



<!-- HERO -->

<section class="contact-hero">

<h1>Contact Us</h1>

<p>We are here to help you find your dream property</p>

</section>



<!-- CONTACT SECTION -->

<section class="contact-section">

<div class="contact-wrapper">   

<!-- CONTACT FORM -->

<div class="contact-form">

<h2>Send a Message</h2>

<form method="POST" action="/contact">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>



<!-- CONTACT INFO -->

<div class="contact-info">

<h2>Contact Information</h2>

<p><i class="fa-solid fa-location-dot"></i> Mumbai, India</p>

<p><i class="fa-solid fa-phone"></i> +91 7208362344</p>

<p><i class="fa-solid fa-envelope"></i> info@propertylounge.com</p>


<div class="social-icons">

<a href="#"><i class="fa-brands fa-facebook"></i></a>

<a href="#"><i class="fa-brands fa-instagram"></i></a>

<a href="#"><i class="fa-brands fa-linkedin"></i></a>

</div>


<a class="whatsapp-btn"
href="https://wa.me/919876543210"
target="_blank">

<i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp

</a>

</div>

</div>

</section>



<!-- MAP -->

<section class="map">

<iframe
src="https://maps.google.com/maps?q=mumbai&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</section>


<footer>

<p>© 2026 Property Lounge. All Rights Reserved.</p>

</footer>


</body>
</html>
